<style>
  #fullAuditModal .modal-content {
    border: 1px solid rgba(30, 58, 95, 0.2);
    border-radius: 0.75rem;
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.18);
  }
  #fullAuditModal .modal-header {
    background: linear-gradient(120deg, #1e3a5f 0%, #152d4a 100%);
    color: #fff;
    border-bottom: 0;
  }
  #fullAuditModal .modal-title {
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  #fullAuditModal .btn-close {
    filter: invert(1);
    opacity: 0.9;
  }
  #fullAuditModal .modal-body {
    background: #f8fafc;
  }
  #fullAuditModal .form-label {
    color: #10253f;
    font-weight: 600;
  }
  #fullAuditModal .form-control,
  #fullAuditModal .form-select {
    border: 1px solid rgba(30, 58, 95, 0.25);
    background: #fff;
  }
  #fullAuditModal .form-control:focus,
  #fullAuditModal .form-select:focus {
    border-color: #e8610a;
    box-shadow: 0 0 0 0.2rem rgba(232, 97, 10, 0.2);
  }
  #fullAuditModal .form-check-input:checked {
    background-color: #e8610a;
    border-color: #e8610a;
  }
  #fullAuditModal .form-check-input:focus {
    box-shadow: 0 0 0 0.2rem rgba(232, 97, 10, 0.2);
  }
  #fullAuditModal .form-check-label a {
    color: #c65308;
    font-weight: 600;
  }
  #fullAuditModal .modal-footer {
    background: #fff;
    border-top: 1px solid rgba(30, 58, 95, 0.12);
  }
  #fullAuditModal .btn-submit-accent {
    background: #e8610a;
    border-color: #e8610a;
    color: #fff;
    font-weight: 600;
  }
  #fullAuditModal .btn-submit-accent:hover {
    background: #cf5508;
    border-color: #cf5508;
    color: #fff;
  }
</style>
<div class="modal fade" id="fullAuditModal" tabindex="-1" aria-labelledby="fullAuditModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title fs-5" id="fullAuditModalLabel">Заказать полный аудит</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>
      <form id="fullAuditForm">
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label for="full-audit-name" class="form-label">Имя</label>
            <input id="full-audit-name" name="name" type="text" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="full-audit-contact" class="form-label">Адрес электронной почты или телефон</label>
            <input id="full-audit-contact" name="contact" type="text" class="form-control" required>
          </div>
          <div class="mb-2">
            <label for="full-audit-method" class="form-label">Предпочитаемый способ связи</label>
            <select id="full-audit-method" name="preferred_method" class="form-select" required>
              <option value="">Выберите вариант</option>
              <option value="email">Email</option>
              <option value="phone">Телефон</option>
            </select>
          </div>
          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" value="1" id="full-audit-consent" required>
            <label class="form-check-label small" for="full-audit-consent">
              Я согласен(на) на обработку моих персональных данных в соответствии с
              <a href="/policy/" target="_blank" rel="noopener noreferrer">Политикой конфиденциальности</a>
            </label>
          </div>
          <p id="full-audit-success" class="small text-success mt-3 mb-0 d-none">Спасибо! Мы свяжемся с вами в ближайшее время.</p>
          <p id="full-audit-error" class="small text-danger mt-2 mb-0 d-none" role="alert"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
          <button type="submit" id="full-audit-submit" class="btn btn-submit-accent">Отправить</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;">
  <div id="fullAuditSuccessToast" class="toast align-items-center text-bg-success border-0" role="status" aria-live="polite" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        Спасибо! Мы свяжемся с вами в ближайшее время.
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
    </div>
  </div>
</div>
<script>
  (function () {
    const form = document.getElementById('fullAuditForm');
    if (!form) return;
    const modalEl = document.getElementById('fullAuditModal');
    const toastEl = document.getElementById('fullAuditSuccessToast');
    const successEl = document.getElementById('full-audit-success');
    const errEl = document.getElementById('full-audit-error');
    const submitBtn = document.getElementById('full-audit-submit');
    const url = "{% url 'frontend_full_audit_lead_submit' %}";

    function getCookie(name) {
      if (!document.cookie) return null;
      const parts = document.cookie.split(';');
      for (let i = 0; i < parts.length; i++) {
        const c = parts[i].trim();
        if (c.substring(0, name.length + 1) === name + '=') {
          return decodeURIComponent(c.substring(name.length + 1));
        }
      }
      return null;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      successEl.classList.add('d-none');
      errEl.classList.add('d-none');
      const tokenInput = form.querySelector('[name=csrfmiddlewaretoken]');
      const csrftoken = tokenInput ? tokenInput.value : getCookie('csrftoken');
      const payload = {
        name: document.getElementById('full-audit-name').value.trim(),
        contact: document.getElementById('full-audit-contact').value.trim(),
        preferred_method: document.getElementById('full-audit-method').value,
      };
      const consent = document.getElementById('full-audit-consent');
      if (!payload.preferred_method) {
        errEl.textContent = 'Выберите предпочитаемый способ связи.';
        errEl.classList.remove('d-none');
        return;
      }
      if (!consent || !consent.checked) {
        errEl.textContent = 'Подтвердите согласие на обработку персональных данных.';
        errEl.classList.remove('d-none');
        return;
      }
      submitBtn.disabled = true;
      try {
        const r = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrftoken || '',
          },
          credentials: 'same-origin',
          body: JSON.stringify(payload),
        });
        const data = await r.json().catch(function () { return {}; });
        if (r.ok && data.ok) {
          successEl.classList.add('d-none');
          form.reset();
          if (window.bootstrap && modalEl) {
            const instance = window.bootstrap.Modal.getOrCreateInstance(modalEl);
            instance.hide();
          }
          if (window.bootstrap && toastEl) {
            const toast = window.bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 5000 });
            toast.show();
          }
        } else {
          errEl.textContent =
            'Не удалось отправить заявку. Попробуйте позже или свяжитесь через раздел «Контакты» на raytec.pro.';
          errEl.classList.remove('d-none');
        }
      } catch (err) {
        errEl.textContent = 'Нет соединения с сервером. Проверьте интернет и попробуйте снова.';
        errEl.classList.remove('d-none');
      } finally {
        submitBtn.disabled = false;
      }
    });
  })();
</script>
